<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - ISO Digital</title>
    <style>
        :root {
            --c-dark-navy: #08182b;
            --c-deep-teal: #003755;
            --c-primary-blue: #005f89;
            --c-gold: #fca311;
            --c-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--c-dark-navy), var(--c-deep-teal), #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--c-white);
        }

        .offline-container {
            text-align: center;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .offline-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            background: rgba(252, 163, 17, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--c-gold) 0%, var(--c-white) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 32px;
        }

        .retry-button {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--c-primary-blue) 0%, var(--c-deep-teal) 100%);
            color: var(--c-white);
            font-weight: 700;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 95, 137, 0.3);
        }

        .retry-button:hover {
            background: linear-gradient(135deg, var(--c-gold) 0%, #fccb6e 100%);
            color: var(--c-dark-navy);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(252, 163, 17, 0.4);
        }

        .status-indicator {
            margin-top: 24px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: blink 1.5s ease-in-out infinite;
        }

        .status-dot.online {
            background: #22c55e;
            animation: none;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @media (max-width: 640px) {
            .offline-container {
                padding: 36px 24px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Tidak Ada Koneksi</h1>
        <p>
            Maaf, Anda sedang offline. Beberapa fitur mungkin tidak tersedia saat ini.
            <br><br>
            Silakan periksa koneksi internet Anda dan coba lagi.
        </p>
        <button class="retry-button" onclick="location.reload()">
            🔄 Coba Lagi
        </button>

        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Offline</span>
        </div>
    </div>

    <script>
        // Auto-detect when connection is back
        function updateOnlineStatus() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            if (navigator.onLine) {
                statusDot.classList.add('online');
                statusText.textContent = 'Online - Memuat ulang...';

                // Wait a bit then reload
                setTimeout(() => {
                    location.reload();
                }, 1000);
            } else {
                statusDot.classList.remove('online');
                statusText.textContent = 'Offline';
            }
        }

        // Listen for online/offline events
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // Check status on load
        updateOnlineStatus();

        // Periodic check every 5 seconds
        setInterval(() => {
            if (navigator.onLine) {
                updateOnlineStatus();
            }
        }, 5000);
    </script>
</body>

</html>
